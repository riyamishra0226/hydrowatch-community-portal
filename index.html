<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HydroWatch Portal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>HydroWatch Community Portal</h1>
            <p>SDG 6 Infrastructure & Water Quality Crowd-Sourced Reporting Tool</p>
        </header>

        <div class="metrics-grid">
            <div class="metric-card">
                <div id="count-total" class="metric-number">0</div>
                <div class="metric-label">Total Reports Tracked</div>
            </div>
            <div class="metric-card critical">
                <div id="count-critical" class="metric-number">0</div>
                <div class="metric-label">Contamination Alerts</div>
            </div>
            <div class="metric-card resolved">
                <div id="count-leakage" class="metric-number">0</div>
                <div class="metric-label">Pipe Leaks Flagged</div>
            </div>
        </div>

        <div class="main-content">
            <div class="panel">
                <h2 class="panel-title">Report An Incident</h2>
                <form id="reportForm">
                    <div class="form-group">
                        <label for="location">Location Name / Area Tag</label>
                        <input type="text" id="location" required>
                    </div>
                    <div class="form-group">
                        <label for="issueType">Primary Water Issue</label>
                        <select id="issueType" required>
                            <option value="Contamination">Water Contamination</option>
                            <option value="Leakage">Pipeline Rupture</option>
                            <option value="Low Pressure">Total Supply Failure</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="description">Detailed Description</label>
                        <textarea id="description" rows="4" required></textarea>
                    </div>
                    <button type="submit">Submit Live Report</button>
                </form>
            </div>

            <div class="panel">
                <h2 class="panel-title">Active Public Incident Logs</h2>
                <div id="reportsList" class="reports-list"></div>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
